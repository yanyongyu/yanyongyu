name: Update README

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *'

jobs:
  wakatime:
    name: Update wakatime stats
    runs-on: ubuntu-latest
    steps:
      - uses: anmol098/waka-readme-stats@master
        with:
          WAKATIME_API_KEY: ${{ secrets.WAKATIME_API_KEY }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          COMMIT_USERNAME: "yanyongyu"
          COMMIT_EMAIL: "42488585+yanyongyu@users.noreply.github.com"
          SHOW_UPDATED_DATE: "True"
          SHOW_PROFILE_VIEWS: "False"
          SHOW_COMMIT: "False"
          SHOW_DAYS_OF_WEEK: "False"
          SHOW_SHORT_INFO: "False"
          SHOW_LOC_CHART: "False"

  github:
    name: Update GitHub stats
    runs-on: ubuntu-latest
    # run after wakatime to avoid commit conflict
    needs: [wakatime]
    steps:
      - uses: actions/checkout@v6

      - name: Generate stats card
        uses: stats-organization/github-readme-stats-action@v1
        with:
          card: stats
          options: username=${{ github.repository_owner }}&count_private=true&show_icons=true&bg_color=15,f2f7fd,E0EAFC
          path: static/github-stats.svg
          token: ${{ secrets.GH_TOKEN }}

      - run: |
          git config user.name "yanyongyu"
          git config user.email "42488585+yanyongyu@users.noreply.github.com"
          git add static
          git diff-index --quiet HEAD || git commit -m ":bento: update github stats"
          git push
